name: Daily GDP Tweet

on:
  schedule:
    # Every day at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      countries:
        description: "Space-separated country codes (e.g. USA CHN DEU). Leave blank for top 5."
        required: false
        default: ""
      preview_only:
        description: "Set to 'true' to preview tweet without posting"
        required: false
        default: "false"

jobs:
  post-gdp-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preview tweet (workflow_dispatch only)
        if: ${{ github.event.inputs.preview_only == 'true' }}
        run: |
          COUNTRIES="${{ github.event.inputs.countries }}"
          if [ -n "$COUNTRIES" ]; then
            python twitter_automation.py --preview --countries $COUNTRIES
          else
            python twitter_automation.py --preview
          fi

      - name: Post GDP tweet
        if: ${{ github.event.inputs.preview_only != 'true' }}
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          COUNTRIES="${{ github.event.inputs.countries }}"
          if [ -n "$COUNTRIES" ]; then
            python twitter_automation.py --countries $COUNTRIES
          else
            python twitter_automation.py
          fi
